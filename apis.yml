aid: google-display-video-360
name: Google Display & Video 360
description: >-
  The Display & Video 360 API enables programmatic management of display, video,
  and audio advertising campaigns. It provides access to advertisers, campaigns,
  insertion orders, line items, creatives, targeting, and audience management for
  enterprise-scale programmatic buying.
